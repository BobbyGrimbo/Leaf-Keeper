<!DOCTYPE html>
<html lang="en">
<head>
  <title>Leaf Keeper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    :root {
      /* Dark botanical palette */
      --forest:      #0d1f14;
      --forest-mid:  #152b1e;
      --forest-card: #1c3527;
      --forest-rim:  #243d2f;
      --moss:        #2d6a4f;
      --moss-light:  #40916c;
      --sage:        #74c69d;
      --sage-pale:   #b7e4c7;
      --cream:       #f8f4ec;
      --cream-dim:   #e8e0d0;
      --gold:        #d4a853;
      --gold-pale:   #f5e6c0;
      --red:         #e05252;
      --red-pale:    #4a1a1a;
      --amber:       #c97b2a;
      --amber-pale:  #3d2a10;
      --blue:        #4a9ebe;
      --blue-pale:   #0f2d3d;
      --ink:         #f0ece4;
      --ink-mid:     #c8c0b0;
      --ink-dim:     #7a7268;
      --border:      rgba(116,198,157,0.12);
      --border-bright: rgba(116,198,157,0.25);
      --glow:        rgba(64,145,108,0.15);
      --r-sm: 8px; --r-md: 14px; --r-lg: 20px; --r-xl: 28px;
      --shadow: 0 2px 8px rgba(0,0,0,0.4), 0 8px 32px rgba(0,0,0,0.3);
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.3);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--forest);
      color: var(--ink);
      min-height: 100vh;
      /* Subtle botanical texture via gradient */
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(45,106,79,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(13,31,20,0.8) 0%, transparent 50%);
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background: var(--forest); }
    ::-webkit-scrollbar-thumb { background: var(--forest-rim); border-radius:3px; }

    /* ══════════════════════════════════
       HEADER
    ══════════════════════════════════ */
    header {
      position: sticky; top:0; z-index:200;
      background: rgba(13,31,20,0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 62px;
      display: flex; align-items:center; justify-content:space-between;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 600;
      color: var(--cream); letter-spacing: -0.3px;
      display: flex; align-items: center; gap: 10px;
    }

    .logo-leaf {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--moss) 0%, var(--moss-light) 100%);
      border-radius: 50% 8px 50% 8px;
      display: flex; align-items:center; justify-content:center;
      font-size: 15px; box-shadow: 0 2px 8px rgba(45,106,79,0.4);
    }

    .logo span { color: var(--sage); }

    .weather-chip {
      display: flex; align-items:center; gap:8px;
      background: var(--forest-card);
      border: 1px solid var(--border);
      border-radius: 999px; padding: 7px 16px;
      font-size: 13px; font-weight:500; color: var(--ink-mid);
    }

    .weather-pulse {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--sage);
      box-shadow: 0 0 6px var(--sage);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.5; transform:scale(0.85); }
    }

    /* ══════════════════════════════════
       CONTAINER + LAYOUT
    ══════════════════════════════════ */
    .container { max-width: 680px; margin: 0 auto; padding: 28px 18px 80px; }

    /* ══════════════════════════════════
       DASHBOARD SUMMARY BAR
    ══════════════════════════════════ */
    .summary-bar {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-bottom: 28px;
    }

    .summary-stat {
      background: var(--forest-card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 14px 16px;
      box-shadow: var(--shadow-sm);
      text-align: center;
    }

    .summary-stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 28px; font-weight: 700;
      color: var(--sage); line-height: 1;
      margin-bottom: 4px;
    }

    .summary-stat-num.amber { color: var(--amber); }
    .summary-stat-num.red   { color: var(--red); }

    .summary-stat-label {
      font-size: 11px; font-weight:500;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--ink-dim);
    }

    /* ══════════════════════════════════
       SECTION HEADING
    ══════════════════════════════════ */
    .section-heading {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }

    .section-heading-text {
      font-family: 'Playfair Display', serif;
      font-size: 18px; font-weight: 600; color: var(--cream);
    }

    .section-heading-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border-bright), transparent);
    }

    /* ══════════════════════════════════
       PLANT CARDS (list)
    ══════════════════════════════════ */
    .plant-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .plant-card {
      background: var(--forest-card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      box-shadow: var(--shadow-sm);
      position: relative;
    }

    .plant-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
      border-color: var(--border-bright);
    }

    .plant-card:active { transform: scale(0.98); }

    .plant-card-img {
      width: 100%; height: 140px;
      object-fit: cover; display: block;
      background: linear-gradient(135deg, var(--forest-mid) 0%, var(--forest-rim) 100%);
    }

    .plant-card-img-placeholder {
      width: 100%; height: 140px;
      background: linear-gradient(135deg, var(--forest-mid) 0%, var(--forest-rim) 100%);
      display: flex; align-items:center; justify-content:center;
      font-size: 44px; opacity: 0.5;
    }

    /* Health bar along the top of card */
    .plant-card-health-bar {
      height: 3px; width: 100%;
      position: absolute; top: 0; left: 0;
    }

    .plant-card-body { padding: 14px 16px 16px; }

    .plant-card-name {
      font-family: 'Playfair Display', serif;
      font-size: 17px; font-weight: 600;
      color: var(--cream); margin-bottom: 3px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .plant-card-species {
      font-size: 12px; color: var(--ink-dim);
      font-style: italic; margin-bottom: 12px;
    }

    .plant-card-stats {
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    /* ══════════════════════════════════
       BADGES
    ══════════════════════════════════ */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600;
      padding: 3px 9px; border-radius: 999px;
      letter-spacing: 0.02em;
    }

    .badge-green  { background: rgba(116,198,157,0.15); color: var(--sage);  border: 1px solid rgba(116,198,157,0.3); }
    .badge-amber  { background: rgba(201,123,42,0.15);  color: var(--gold);  border: 1px solid rgba(201,123,42,0.3); }
    .badge-red    { background: rgba(224,82,82,0.15);   color: var(--red);   border: 1px solid rgba(224,82,82,0.3); }
    .badge-blue   { background: rgba(74,158,190,0.15);  color: var(--blue);  border: 1px solid rgba(74,158,190,0.3); }
    .badge-gold   { background: rgba(212,168,83,0.15);  color: var(--gold);  border: 1px solid rgba(212,168,83,0.3); }

    /* ══════════════════════════════════
       EMPTY STATE
    ══════════════════════════════════ */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--ink-dim); grid-column: 1/-1;
    }

    .empty-icon { font-size: 52px; margin-bottom: 14px; opacity: 0.5; }
    .empty-state p { font-size: 14px; line-height: 1.7; }

    /* ══════════════════════════════════
       ADD PLANT FORM
    ══════════════════════════════════ */
    .form-card {
      background: var(--forest-card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 24px 20px;
      box-shadow: var(--shadow-sm);
    }

    .form-row { margin-bottom: 14px; }

    .form-row label {
      display: block;
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--ink-dim); margin-bottom: 6px;
    }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    input, select, textarea {
      width: 100%; padding: 11px 14px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: var(--forest-mid);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--ink);
      outline: none; transition: border-color 0.2s, background 0.2s;
    }

    input::placeholder, textarea::placeholder { color: var(--ink-dim); }

    input:focus, select:focus, textarea:focus {
      border-color: var(--moss-light);
      background: var(--forest-rim);
    }

    select option { background: var(--forest-mid); color: var(--ink); }
    textarea { resize: vertical; min-height: 80px; }

    /* ══════════════════════════════════
       BUTTONS
    ══════════════════════════════════ */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 11px 20px; border-radius: 999px; border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.18s ease;
      letter-spacing: 0.01em;
    }

    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: linear-gradient(135deg, var(--moss) 0%, var(--moss-light) 100%);
      color: white;
      box-shadow: 0 2px 12px rgba(45,106,79,0.4);
    }
    .btn-primary:hover { box-shadow: 0 4px 20px rgba(45,106,79,0.6); filter: brightness(1.1); }

    .btn-ghost {
      background: var(--forest-card);
      color: var(--ink-mid);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--border-bright); color: var(--sage); }

    .btn-blue {
      background: rgba(74,158,190,0.15);
      color: var(--blue);
      border: 1px solid rgba(74,158,190,0.3);
    }
    .btn-blue:hover { background: rgba(74,158,190,0.25); }

    .btn-danger {
      background: rgba(224,82,82,0.15);
      color: var(--red);
      border: 1px solid rgba(224,82,82,0.3);
    }
    .btn-danger:hover { background: rgba(224,82,82,0.25); }

    .btn-gold {
      background: rgba(212,168,83,0.15);
      color: var(--gold);
      border: 1px solid rgba(212,168,83,0.3);
    }
    .btn-gold:hover { background: rgba(212,168,83,0.25); }

    .btn-sm { padding: 7px 16px; font-size: 13px; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 18px; }

    /* ══════════════════════════════════
       DETAIL VIEW
    ══════════════════════════════════ */
    .detail-hero {
      position: relative;
      width: 100%;
      border-radius: var(--r-xl);
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    .detail-hero img {
      width: 100%; display: block;
      max-height: 300px; object-fit: cover;
    }

    .detail-hero-empty {
      height: 200px;
      background: linear-gradient(135deg, var(--forest-mid) 0%, var(--forest-rim) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 64px; opacity: 0.4;
    }

    /* Gradient overlay on hero image */
    .detail-hero-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(transparent, rgba(13,31,20,0.85));
      pointer-events: none;
    }

    .detail-hero-title {
      position: absolute; bottom: 16px; left: 20px; right: 20px;
    }

    .detail-plant-name {
      font-family: 'Playfair Display', serif;
      font-size: 28px; font-weight: 700;
      color: white; line-height: 1.1;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .detail-plant-species {
      font-size: 14px; color: rgba(255,255,255,0.7);
      font-style: italic; margin-top: 3px;
    }

    /* ── HEALTH RING ── */
    .health-block {
      background: var(--forest-card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-sm);
      display: flex; align-items: center; gap: 20px;
    }

    .health-ring-wrap {
      flex-shrink: 0;
      position: relative; width: 72px; height: 72px;
    }

    .health-ring-wrap svg { width: 72px; height: 72px; transform: rotate(-90deg); }

    .health-ring-track { fill: none; stroke: var(--forest-rim); stroke-width: 5; }
    .health-ring-fill  { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.8s ease; }

    .health-ring-num {
      position: absolute; inset: 0;
      display: flex; align-items:center; justify-content:center;
      font-family: 'Playfair Display', serif;
      font-size: 20px; font-weight: 700;
    }

    .health-info-title {
      font-family: 'Playfair Display', serif;
      font-size: 17px; font-weight: 600; color: var(--cream);
      margin-bottom: 4px;
    }

    .health-info-sub {
      font-size: 13px; color: var(--ink-mid); line-height: 1.5;
    }

    /* ── CARE CARDS ── */
    .care-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin-bottom: 14px;
    }

    .care-card {
      background: var(--forest-card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 16px;
      box-shadow: var(--shadow-sm);
    }

    .care-card-icon { font-size: 22px; margin-bottom: 8px; }

    .care-card-label {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--ink-dim); margin-bottom: 6px;
    }

    .care-card-status { margin-bottom: 6px; }

    .care-card-date {
      font-size: 12px; color: var(--ink-dim); margin-bottom: 12px;
    }

    /* ── FACTS CARD ── */
    .facts-card {
      background: var(--forest-card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-sm);
    }

    .facts-heading {
      font-family: 'Playfair Display', serif;
      font-size: 16px; font-weight: 600;
      color: var(--cream); margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }

    .fact-row {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 9px 0; border-bottom: 1px solid var(--border);
      font-size: 13px; line-height: 1.55;
    }

    .fact-row:last-child { border-bottom: none; padding-bottom: 0; }

    .fact-icon { flex-shrink: 0; font-size: 16px; margin-top: 1px; }

    .fact-label {
      flex-shrink: 0; width: 70px;
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--sage); padding-top: 2px;
    }

    .fact-text { color: var(--ink-mid); }

    /* ── COACH BOX ── */
    .coach-box {
      background: linear-gradient(135deg, rgba(45,106,79,0.2) 0%, rgba(64,145,108,0.1) 100%);
      border: 1px solid rgba(116,198,157,0.2);
      border-radius: var(--r-lg);
      padding: 14px 16px;
      font-size: 13px; color: var(--sage-pale);
      line-height: 1.65; margin-bottom: 14px;
    }

    .coach-label {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.09em;
      color: var(--sage); margin-bottom: 5px;
    }

    /* ── META TABLE ── */
    .meta-card {
      background: var(--forest-card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 6px 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-sm);
    }

    .meta-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 11px 0; border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .meta-row:last-child { border-bottom: none; }
    .meta-label { color: var(--ink-dim); }
    .meta-value { font-weight: 500; color: var(--ink-mid); text-align: right; }

    /* ── PHOTO UPLOAD ── */
    .upload-zone {
      border: 1.5px dashed var(--border-bright);
      border-radius: var(--r-lg);
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 14px;
    }

    .upload-zone:hover { background: var(--glow); border-color: var(--moss-light); }

    .upload-zone-text {
      font-size: 13px; color: var(--ink-dim);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    input[type="file"] { display: none; }

    /* ── EDIT FORM ── */
    .edit-card {
      background: var(--forest-mid);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 22px 20px;
      margin-top: 14px;
    }

    .edit-heading {
      font-family: 'Playfair Display', serif;
      font-size: 16px; font-weight: 600;
      color: var(--cream); margin-bottom: 16px;
    }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-bright), transparent);
      margin: 24px 0;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(90px);
      background: linear-gradient(135deg, var(--moss) 0%, var(--moss-light) 100%);
      color: white; padding: 12px 24px;
      border-radius: 999px; font-size: 14px; font-weight: 600;
      z-index: 999; pointer-events: none;
      box-shadow: 0 4px 20px rgba(45,106,79,0.5);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── UTILS ── */
    .hidden { display: none !important; }
    .mt-sm { margin-top: 8px; }
    .mt-md { margin-top: 16px; }
    .mt-lg { margin-top: 28px; }
    .loading-text { text-align:center; padding:40px 20px; color:var(--ink-dim); font-size:14px; }
  </style>
</head>

<body>

<header>
  <div class="logo">
    <div class="logo-leaf">🌿</div>
    Leaf<span>Keeper</span>
  </div>
  <div class="weather-chip">
    <div class="weather-pulse"></div>
    <span id="weatherText">London</span>
  </div>
</header>

<div class="container">

  <!-- ═══════════════════════ LIST VIEW ═══════════════════════ -->
  <div id="listView">

    <!-- Dashboard summary -->
    <div id="summaryBar" class="summary-bar">
      <div class="summary-stat">
        <div class="summary-stat-num" id="statTotal">—</div>
        <div class="summary-stat-label">Plants</div>
      </div>
      <div class="summary-stat">
        <div class="summary-stat-num amber" id="statDue">—</div>
        <div class="summary-stat-label">Need water</div>
      </div>
      <div class="summary-stat">
        <div class="summary-stat-num red" id="statAlert">—</div>
        <div class="summary-stat-label">Need attention</div>
      </div>
    </div>

    <div class="section-heading">
      <div class="section-heading-text">Your Collection</div>
      <div class="section-heading-line"></div>
    </div>

    <div id="plantGrid" class="plant-grid">
      <div class="loading-text">Loading your plants…</div>
    </div>

    <div class="divider"></div>

    <div class="section-heading">
      <div class="section-heading-text">Add a Plant</div>
      <div class="section-heading-line"></div>
    </div>

    <div class="form-card">
      <div class="form-row"><label>Name *</label><input id="newName" placeholder="e.g. Boris the Ficus"></div>
      <div class="form-row"><label>Species</label><input id="newSpecies" placeholder="e.g. Ficus lyrata"></div>
      <div class="form-row"><label>Location in home</label><input id="newLocation" placeholder="e.g. Living room windowsill"></div>
      <div class="form-row">
        <label>Plant type</label>
        <select id="newType">
          <option value="general">General</option>
          <option value="fiddle leaf fig">Fiddle Leaf Fig</option>
          <option value="monstera">Monstera</option>
          <option value="rubber plant">Rubber Plant</option>
          <option value="snake plant">Snake Plant</option>
          <option value="pothos">Pothos</option>
          <option value="peace lily">Peace Lily</option>
          <option value="tropical">Tropical</option>
          <option value="succulent">Succulent</option>
          <option value="cactus">Cactus</option>
          <option value="orchid">Orchid</option>
          <option value="fern">Fern</option>
          <option value="lemon tree">Lemon Tree</option>
        </select>

/* ═══════════════════════════════════════
   CARE STATUS
═══════════════════════════════════════ */
function careStatus(lastDate, intervalDays) {
  if (!lastDate || !intervalDays) return null;
  const daysLeft = Math.round((new Date(lastDate).getTime() + intervalDays * 86400000 - Date.now()) / 86400000);
  if (daysLeft > 1)  return { label:`Due in ${daysLeft}d`,              cls:"badge-green", daysLeft };
  if (daysLeft >= 0) return { label:"Due soon",                         cls:"badge-amber", daysLeft };
  return               { label:`${Math.abs(daysLeft)}d overdue`,        cls:"badge-red",   daysLeft };
}

/* ═══════════════════════════════════════
   HEALTH SCORE
═══════════════════════════════════════ */
function calcHealth(plant) {
  const ws = careStatus(plant.last_watered,    plant.watering_interval_days);
  const fs = careStatus(plant.last_fertilized, plant.fertilize_interval_days);
  let score = 100, issues = [];

  if (!plant.last_watered) {
    score -= 30; issues.push("no watering recorded");
  } else if (ws && ws.daysLeft < 0) {
    const p = Math.min(40, Math.abs(ws.daysLeft) * 5);
    score -= p;
    if (Math.abs(ws.daysLeft) >= 2) issues.push(`watering ${Math.abs(ws.daysLeft)}d overdue`);
  }

  if (!plant.last_fertilized) {
    score -= 10;
  } else if (fs && fs.daysLeft < 0) {
    const p = Math.min(20, Math.abs(fs.daysLeft) * 2);
    score -= p;
    if (Math.abs(fs.daysLeft) >= 7) issues.push("fertilizing overdue");
  }

  score = Math.max(0, Math.min(100, score));

  let tier, color, ringColor;
  if (score >= 80) {
    tier = "Thriving"; color = "var(--sage)"; ringColor = "#40916c";
  } else if (score >= 55) {
    tier = "Doing OK"; color = "var(--gold)"; ringColor = "#c97b2a";
  } else {
    tier = "Needs Attention"; color = "var(--red)"; ringColor = "#e05252";
  }

  const summary = issues.length === 0
    ? "All care is up to date — looking great!"
    : `${issues.map(i => i.charAt(0).toUpperCase() + i.slice(1)).join(", ")}.`;

  return { score, tier, color, ringColor, summary };
}

/* ═══════════════════════════════════════
   HEALTH BAR COLOUR
═══════════════════════════════════════ */
function healthBarGradient(score) {
  if (score >= 80) return "linear-gradient(90deg, #2d6a4f, #74c69d)";
  if (score >= 55) return "linear-gradient(90deg, #92600a, #d4a853)";
  return                  "linear-gradient(90deg, #7a1a1a, #e05252)";
}

/* ═══════════════════════════════════════
   LOAD PLANTS
═══════════════════════════════════════ */
async function loadPlants() {
  const grid = document.getElementById("plantGrid");
  const { data, error } = await db.from("plants").select("*").order("created_at", { ascending: false });

  if (error) {
    grid.innerHTML = `<div class="loading-text" style="color:var(--red)">Failed to load plants. Check console.</div>`;
    console.error("loadPlants:", error);
    return;
  }

  // Update summary bar
  if (data) {
    const due   = data.filter(p => { const s = careStatus(p.last_watered, p.watering_interval_days); return s && s.daysLeft <= 1; });
    const alert = data.filter(p => calcHealth(p).score < 55);
    document.getElementById("statTotal").textContent = data.length;
    document.getElementById("statDue").textContent   = due.length;
    document.getElementById("statAlert").textContent = alert.length;
  }

  if (!data || data.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🌱</div>
        <p>Your collection is empty.<br>Add your first plant below.</p>
      </div>`;
    return;
  }

  grid.innerHTML = data.map(p => {
    const health = calcHealth(p);
    const ws     = careStatus(p.last_watered, p.watering_interval_days);
    const badge  = ws ? `<span class="badge ${ws.cls}">${ws.label}</span>` : `<span class="badge badge-green">No schedule</span>`;
    const imgEl  = p.photo_url
      ? `<img class="plant-card-img" src="${p.photo_url}" alt="${escHtml(p.name)}">`
      : `<div class="plant-card-img-placeholder">🌿</div>`;

    return `
      <div class="plant-card" onclick="openPlant('${p.id}')">
        <div class="plant-card-health-bar" style="background:${healthBarGradient(health.score)}"></div>
        ${imgEl}
        <div class="plant-card-body">
          <div class="plant-card-name">
            ${escHtml(p.name)}
            <span style="font-size:11px;font-weight:600;color:${health.color}">${health.score}</span>
          </div>
          <div class="plant-card-species">${escHtml(p.species || p.plant_type || "")}</div>
          <div class="plant-card-stats">
            ${badge}
            <span class="badge badge-gold">${escHtml(p.location || "")}</span>
          </div>
        </div>
      </div>`;
  }).join("");
}

  const payload = {
    name:                    nameVal,
    species:                 document.getElementById("newSpecies").value.trim() || null,
    location:                document.getElementById("newLocation").value.trim() || null,
    plant_type:              document.getElementById("newType").value,
    watering_interval_days:  parseInt(document.getElementById("newInterval").value) || 7,
    fertilize_interval_days: parseInt(document.getElementById("newFertilizeInterval").value) || 30,
    notes:                   document.getElementById("newNotes").value.trim() || null,
  };

  const { error } = await db.from("plants").insert([payload]);
  if (error) { toast("Error adding plant"); console.error("addPlant:", error); return; }

  ["newName","newSpecies","newLocation","newInterval","newFertilizeInterval","newNotes"]
    .forEach(id => { document.getElementById(id).value = ""; });
  document.getElementById("newType").value = "general";

  toast("Added to your collection 🌱");
  loadPlants();

      <div class="detail-hero-overlay"></div>
      <div class="detail-hero-title">
        <div class="detail-plant-name">${escHtml(data.name)}</div>
        <div class="detail-plant-species">${escHtml(data.species || "")}</div>
      </div>`;
  }

  // Health ring
  const health  = calcHealth(data);
  const circumf = 188.5;
  const offset  = circumf - (health.score / 100) * circumf;

  document.getElementById("healthRingFill").style.stroke          = health.ringColor;
  document.getElementById("healthRingFill").style.strokeDashoffset = offset;
  document.getElementById("healthRingNum").textContent            = health.score;
  document.getElementById("healthRingNum").style.color            = health.color;
  document.getElementById("healthTitle").textContent              = health.tier;
  document.getElementById("healthSub").textContent                = health.summary;

  // Care cards
  const ws = careStatus(data.last_watered,    data.watering_interval_days);
  const fs = careStatus(data.last_fertilized, data.fertilize_interval_days);

  document.getElementById("waterStatus").innerHTML    = ws ? `<span class="badge ${ws.cls}">${ws.label}</span>` : `<span class="badge badge-green">No schedule</span>`;
  document.getElementById("waterDate").textContent    = data.last_watered    ? `Last: ${fmtDate(data.last_watered)}`    : "Never recorded";
  document.getElementById("fertilizeStatus").innerHTML = fs ? `<span class="badge ${fs.cls}">${fs.label}</span>` : `<span class="badge badge-green">No schedule</span>`;
  document.getElementById("fertilizeDate").textContent = data.last_fertilized ? `Last: ${fmtDate(data.last_fertilized)}` : "Never recorded";

  // Facts
  renderFacts(data.plant_type);

  // Coach
  renderCoach(data.plant_type);

  // Meta
  document.getElementById("detailMeta").innerHTML = `
    ${metaRow("Location",       data.location || "—")}
    ${metaRow("Type",           data.plant_type || "—")}
    ${metaRow("Water every",    data.watering_interval_days  ? `${data.watering_interval_days} days`  : "—")}
    ${metaRow("Fertilize every",data.fertilize_interval_days ? `${data.fertilize_interval_days} days` : "—")}
    ${data.notes ? metaRow("Notes", escHtml(data.notes)) : ""}
  `;
}

function metaRow(label, value) {
  return `<div class="meta-row"><span class="meta-label">${label}</span><span class="meta-value">${value}</span></div>`;
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" });
}

/* ═══════════════════════════════════════
   FACTS + COACH
═══════════════════════════════════════ */
function renderFacts(type) {
  const box  = document.getElementById("factsCard");
  const data = SPECIES_FACTS[type] || SPECIES_FACTS["general"];
  box.innerHTML = `
    <div class="facts-heading">${data.emoji} About this plant</div>
    ${data.facts.map(f => `
      <div class="fact-row">
        <span class="fact-icon">${f.icon}</span>
        <span class="fact-label">${f.label}</span>
        <span class="fact-text">${f.text}</span>
      </div>`).join("")}`;
  box.classList.remove("hidden");
}

function renderCoach(type) {
  const box = document.getElementById("coachBox");
  const tip = PRO_TIPS[type];
  if (tip) {
    box.innerHTML = `<div class="coach-label">💡 Pro tip</div>${tip}`;
    box.classList.remove("hidden");
  } else {
    box.classList.add("hidden");
  }
}

/* ═══════════════════════════════════════
   WATER + FERTILIZE
═══════════════════════════════════════ */
async function waterPlant() {
  if (!current) return;
  const { error } = await db.from("plants").update({ last_watered: new Date().toISOString() }).eq("id", current.id);
  if (error) { toast("Error logging watering"); console.error(error); return; }
  toast("Watered 💧");
  openPlant(current.id); loadPlants();
}

async function fertilizePlant() {
  if (!current) return;
  const { error } = await db.from("plants").update({ last_fertilized: new Date().toISOString() }).eq("id", current.id);
  if (error) { toast("Error logging fertilizing"); console.error(error); return; }
  toast("Fertilized 🌿");
  openPlant(current.id); loadPlants();
}

/* ═══════════════════════════════════════
   PHOTO UPLOAD
═══════════════════════════════════════ */
async function uploadPhoto() {
  const file = document.getElementById("photoInput").files[0];
  if (!file || !current) return;
  toast("Uploading…");

  const ext      = file.name.split(".").pop();
  const fileName = `${current.id}-${Date.now()}.${ext}`;

  const { error: uploadError } = await db.storage.from("plant-photos").upload(fileName, file, { upsert: true });
  if (uploadError) { toast("Upload failed"); console.error(uploadError); return; }

  const { data: urlData } = db.storage.from("plant-photos").getPublicUrl(fileName);

  const { error: updateError } = await db.from("plants").update({ photo_url: urlData.publicUrl }).eq("id", current.id);
  if (updateError) { toast("Could not save photo"); console.error(updateError); return; }

  toast("Photo saved 📷");
  openPlant(current.id); loadPlants();
}

/* ═══════════════════════════════════════
   EDIT
═══════════════════════════════════════ */
function showEditBox() {
  if (!current) return;
  document.getElementById("eName").value               = current.name || "";
  document.getElementById("eSpecies").value            = current.species || "";
  document.getElementById("eLocation").value           = current.location || "";
  document.getElementById("eInterval").value           = current.watering_interval_days || 7;
  document.getElementById("eFertilizeInterval").value  = current.fertilize_interval_days || 30;
  document.getElementById("eType").value               = current.plant_type || "general";
  document.getElementById("eNotes").value              = current.notes || "";
  document.getElementById("editBox").classList.remove("hidden");
  document.getElementById("editBox").scrollIntoView({ behavior: "smooth" });
}

function hideEditBox() { document.getElementById("editBox").classList.add("hidden"); }

async function saveEdit() {
  if (!current) return;
  const payload = {
    name:                    document.getElementById("eName").value.trim(),
    species:                 document.getElementById("eSpecies").value.trim() || null,
    location:                document.getElementById("eLocation").value.trim() || null,
    plant_type:              document.getElementById("eType").value,
    watering_interval_days:  parseInt(document.getElementById("eInterval").value) || 7,
    fertilize_interval_days: parseInt(document.getElementById("eFertilizeInterval").value) || 30,
    notes:                   document.getElementById("eNotes").value.trim() || null,
  };
  if (!payload.name) { toast("Name is required"); return; }

  const { error } = await db.from("plants").update(payload).eq("id", current.id);
  if (error) { toast("Error saving"); console.error(error); return; }

  toast("Saved ✓");
  hideEditBox(); openPlant(current.id); loadPlants();
}

/* ═══════════════════════════════════════
   DELETE
═══════════════════════════════════════ */
async function deletePlant() {
  if (!current) return;
  if (!confirm(`Delete "${current.name}"? This can't be undone.`)) return;
  const { error } = await db.from("plants").delete().eq("id", current.id);
  if (error) { toast("Error deleting"); console.error(error); return; }
  toast("Plant removed from collection");
  back(); loadPlants();
}

/* ═══════════════════════════════════════
   NAV
═══════════════════════════════════════ */
function back() {
  document.getElementById("detailView").classList.add("hidden");
  document.getElementById("listView").classList.remove("hidden");
  current = null;
}

/* ═══════════════════════════════════════
   UTILITY
═══════════════════════════════════════ */
function escHtml(str) {
  if (!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ═══════════════════════════════════════
   BOOT
═══════════════════════════════════════ */
loadWeather();
loadPlants();
</script>

</html>
