<!DOCTYPE html>
<html lang="en">
<head>
  <title>Leaf Keeper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-deep:   #1a3a27;
      --green-mid:    #2f6b45;
      --green-soft:   #4a9060;
      --green-pale:   #eaf6ee;
      --green-mist:   #f4f7f4;
      --cream:        #fdfcf8;
      --ink:          #1b2b1f;
      --ink-muted:    #5a7263;
      --border:       rgba(42, 90, 58, 0.12);
      --red:          #b42318;
      --radius-sm:    8px;
      --radius-md:    14px;
      --radius-lg:    20px;
      --shadow-card:  0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--green-mist);
      color: var(--ink);
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(253,252,248,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--green-deep);
      letter-spacing: -0.2px;
    }

    .header-logo span { color: var(--green-soft); }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 16px 48px;
    }

    .weather-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-muted);
      margin-bottom: 24px;
    }

    .weather-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green-soft);
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 10px;
    }

    .plant-card {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: var(--shadow-card);
    }

    .plant-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.06);
    }

    .plant-card:active { transform: scale(0.99); }

    .plant-card-left { display: flex; align-items: center; gap: 12px; }

    .plant-avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      background: var(--green-pale);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .plant-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: var(--radius-sm);
    }

    .plant-card-name { font-weight: 500; font-size: 15px; color: var(--ink); }
    .plant-card-sub  { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }
    .plant-card-arrow { color: var(--ink-muted); font-size: 18px; opacity: 0.4; }

    .water-badge { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 999px; }
    .water-ok    { background: var(--green-pale); color: var(--green-mid); }
    .water-due   { background: #fff3cd; color: #856404; }
    .water-late  { background: #fce8e8; color: #b42318; }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--ink-muted); }
    .empty-state .big-leaf { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    .form-card {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 16px;
      box-shadow: var(--shadow-card);
    }

    .form-row { margin-bottom: 10px; }

    .form-row label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-muted);
      margin-bottom: 4px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--green-mist);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--green-soft);
      background: white;
    }

    textarea { resize: vertical; min-height: 72px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--green-mid); color: white; }
    .btn-primary:hover { background: var(--green-deep); }
    .btn-ghost { background: transparent; color: var(--ink-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--green-pale); color: var(--green-mid); }
    .btn-danger { background: var(--red); color: white; }
    .btn-danger:hover { background: #8f1c14; }
    .btn-sm { padding: 7px 14px; font-size: 13px; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }

    .detail-photo {
      width: 100%;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--green-pale);
      margin-bottom: 16px;
    }

    .detail-photo img {
      width: 100%;
      display: block;
      max-height: 260px;
      object-fit: cover;
    }

    .detail-photo-empty {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      opacity: 0.4;
    }

    .detail-meta {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-card);
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }

    .meta-row:last-child { border-bottom: none; }
    .meta-label { color: var(--ink-muted); }
    .meta-value { font-weight: 500; color: var(--ink); }

    .coach-box {
      background: var(--green-pale);
      border: 1px solid rgba(47,107,69,0.15);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      font-size: 13px;
      color: var(--green-deep);
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .coach-box-title {
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--green-soft);
      margin-bottom: 4px;
    }

    .file-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px dashed var(--green-soft);
      font-size: 13px;
      font-weight: 500;
      color: var(--green-mid);
      cursor: pointer;
      transition: background 0.15s;
    }

    .file-label:hover { background: var(--green-pale); }
    input[type="file"] { display: none; }

    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green-deep);
      color: white;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    .hidden { display: none !important; }
    .mt-8  { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .mt-24 { margin-top: 24px; }
    .loading-text { text-align: center; padding: 24px; color: var(--ink-muted); font-size: 14px; }
  </style>
</head>

<body>

<header>
  <div class="header-logo">🌿 Leaf<span>Keeper</span></div>
  <div id="weatherPill" class="weather-pill">
    <div class="weather-dot"></div>
    <span id="weatherText">Loading…</span>
  </div>
</header>

<div class="container">

  <!-- LIST VIEW -->
  <div id="listView">
    <div class="mt-24">
      <div class="section-label">Your plants</div>
      <div id="plantList"><div class="loading-text">Loading plants…</div></div>
    </div>

    <div class="divider"></div>

    <div class="section-label">Add a plant</div>
    <div class="form-card">
      <div class="form-row"><label>Name *</label><input id="newName" placeholder="e.g. Boris the Ficus"></div>
      <div class="form-row"><label>Species</label><input id="newSpecies" placeholder="e.g. Ficus lyrata"></div>
      <div class="form-row"><label>Location</label><input id="newLocation" placeholder="e.g. Living room windowsill"></div>
      <div class="form-row">
        <label>Plant type</label>
        <select id="newType">
          <option value="general">General</option>
          <option value="tropical">Tropical</option>
          <option value="succulent">Succulent</option>
          <option value="fern">Fern</option>
          <option value="fiddle leaf fig">Fiddle Leaf Fig</option>
        </select>
      </div>
      <div class="form-row"><label>Watering interval (days)</label><input id="newInterval" type="number" placeholder="7" min="1" max="365"></div>
      <div class="form-row"><label>Notes</label><textarea id="newNotes" placeholder="Any care notes…"></textarea></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="addPlant()">Add plant</button>
      </div>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detailView" class="hidden">
    <div class="btn-row" style="margin-top: 0; margin-bottom: 20px;">
      <button class="btn btn-ghost btn-sm" onclick="back()">← Back</button>
    </div>

    <div id="detailPhoto" class="detail-photo">
      <div class="detail-photo-empty">🌿</div>
    </div>

    <h2 id="detailName" style="font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--green-deep); margin-bottom: 4px;"></h2>
    <p id="detailSpecies" style="font-size: 14px; color: var(--ink-muted); margin-bottom: 16px;"></p>

    <div id="coachBox" class="coach-box hidden"></div>
    <div id="detailMeta" class="detail-meta"></div>

    <label class="file-label" for="photoInput">📷 Upload photo</label>
    <input type="file" id="photoInput" accept="image/*" onchange="uploadPhoto()">

    <div class="btn-row mt-16">
      <button class="btn btn-primary btn-sm" onclick="waterPlant()">💧 Water now</button>
      <button class="btn btn-ghost btn-sm" onclick="showEditBox()">✏️ Edit</button>
      <button class="btn btn-danger btn-sm" onclick="deletePlant()">Delete</button>
    </div>

    <div id="editBox" class="hidden">
      <div class="divider"></div>
      <div class="section-label">Edit plant</div>
      <div class="form-card">
        <div class="form-row"><label>Name</label><input id="eName"></div>
        <div class="form-row"><label>Species</label><input id="eSpecies"></div>
        <div class="form-row"><label>Location</label><input id="eLocation"></div>
        <div class="form-row">
          <label>Plant type</label>
          <select id="eType">
            <option value="general">General</option>
            <option value="tropical">Tropical</option>
            <option value="succulent">Succulent</option>
            <option value="fern">Fern</option>
            <option value="fiddle leaf fig">Fiddle Leaf Fig</option>
          </select>
        </div>
        <div class="form-row"><label>Watering interval (days)</label><input id="eInterval" type="number" min="1" max="365"></div>
        <div class="form-row"><label>Notes</label><textarea id="eNotes"></textarea></div>
        <div class="btn-row">
          <button class="btn btn-primary btn-sm" onclick="saveEdit()">Save changes</button>
          <button class="btn btn-ghost btn-sm" onclick="hideEditBox()">Cancel</button>
        </div>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
const { createClient } = supabase;

const db = createClient(
  "https://norlzfajrksdgwpyrzpq.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vcmx6ZmFqcmtzZGd3cHlyenBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzODUzNTEsImV4cCI6MjA5NTk2MTM1MX0.jwBTgh4jhALWf9RUhlEEzE2xKeyMMI8QWn4ArA7P-Ts"
);

let current = null;

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2400);
}

async function loadWeather() {
  try {
    const res = await fetch(
      "https://api.open-meteo.com/v1/forecast?latitude=51.5072&longitude=-0.1276&current=temperature_2m,weathercode"
    );
    if (!res.ok) throw new Error();
    const data = await res.json();
    const temp = data?.current?.temperature_2m;
    document.getElementById("weatherText").textContent =
      temp != null ? `London · ${temp}°C` : "London";
  } catch {
    document.getElementById("weatherText").textContent = "Weather unavailable";
  }
}

function waterStatus(plant) {
  if (!plant.last_watered || !plant.watering_interval_days) return null;
  const lastMs     = new Date(plant.last_watered).getTime();
  const intervalMs = plant.watering_interval_days * 86400000;
  const dueMs      = lastMs + intervalMs;
  const daysLeft   = Math.round((dueMs - Date.now()) / 86400000);
  if (daysLeft > 1)  return { label: `Water in ${daysLeft}d`, cls: "water-ok" };
  if (daysLeft >= 0) return { label: "Water soon",            cls: "water-due" };
  return               { label: `${Math.abs(daysLeft)}d overdue`, cls: "water-late" };
}

async function loadPlants() {
  const el = document.getElementById("plantList");
  const { data, error } = await db.from("plants").select("*").order("created_at", { ascending: false });

  if (error) {
    el.innerHTML = `<div class="loading-text" style="color:var(--red)">Failed to load plants. Check console.</div>`;
    console.error("loadPlants error:", error);
    return;
  }

  if (!data || data.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="big-leaf">🌱</div><p>No plants yet.<br>Add your first one below.</p></div>`;
    return;
  }

  el.innerHTML = data.map(p => {
    const ws     = waterStatus(p);
    const badge  = ws ? `<span class="water-badge ${ws.cls}">${ws.label}</span>` : "";
    const avatar = p.photo_url ? `<img src="${p.photo_url}" alt="">` : `<span>🌿</span>`;
    return `
      <div class="plant-card" onclick="openPlant('${p.id}')">
        <div class="plant-card-left">
          <div class="plant-avatar">${avatar}</div>
          <div>
            <div class="plant-card-name">${escHtml(p.name)}</div>
            <div class="plant-card-sub">${escHtml(p.location || p.species || "")}</div>
          </div>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
          ${badge}
          <span class="plant-card-arrow">›</span>
        </div>
      </div>`;
  }).join("");
}

async function addPlant() {
  const nameVal = document.getElementById("newName").value.trim();
  if (!nameVal) { toast("Please enter a plant name"); return; }

  const payload = {
    name:                   nameVal,
    species:                document.getElementById("newSpecies").value.trim() || null,
    location:               document.getElementById("newLocation").value.trim() || null,
    plant_type:             document.getElementById("newType").value,
    watering_interval_days: parseInt(document.getElementById("newInterval").value) || 7,
    notes:                  document.getElementById("newNotes").value.trim() || null,
  };

  const { error } = await db.from("plants").insert([payload]);
  if (error) { toast("Error adding plant"); console.error("addPlant error:", error); return; }

  ["newName","newSpecies","newLocation","newInterval","newNotes"].forEach(id => {
    document.getElementById(id).value = "";
  });
  document.getElementById("newType").value = "general";

  toast("Plant added 🌱");
  loadPlants();
}

async function openPlant(id) {
  const { data, error } = await db.from("plants").select("*").eq("id", id).single();
  if (error || !data) { toast("Could not load plant"); console.error("openPlant error:", error); return; }

  current = data;
  document.getElementById("listView").classList.add("hidden");
  document.getElementById("detailView").classList.remove("hidden");
  document.getElementById("editBox").classList.add("hidden");
  window.scrollTo(0, 0);

  const photoBox = document.getElementById("detailPhoto");
  photoBox.innerHTML = data.photo_url
    ? `<img src="${data.photo_url}" alt="Photo of ${escHtml(data.name)}">`
    : `<div class="detail-photo-empty">🌿</div>`;

  document.getElementById("detailName").textContent    = data.name;
  document.getElementById("detailSpecies").textContent = data.species || "";

  const ws         = waterStatus(data);
  const lastWatered = data.last_watered
    ? new Date(data.last_watered).toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" })
    : "Never";

  document.getElementById("detailMeta").innerHTML = `
    ${metaRow("Location",       data.location || "—")}
    ${metaRow("Type",           data.plant_type || "—")}
    ${metaRow("Watering every", data.watering_interval_days ? `${data.watering_interval_days} days` : "—")}
    ${metaRow("Last watered",   lastWatered)}
    ${ws ? metaRow("Status",    `<span class="water-badge ${ws.cls}">${ws.label}</span>`) : ""}
    ${data.notes ? metaRow("Notes", escHtml(data.notes)) : ""}
  `;

  showCoach(data.plant_type);
}

function metaRow(label, value) {
  return `<div class="meta-row"><span class="meta-label">${label}</span><span class="meta-value">${value}</span></div>`;
}

function showCoach(type) {
  const tips = {
    "fiddle leaf fig": "Loves bright indirect light. Avoid moving it — it hates change. Let the top 2cm of soil dry out before watering.",
    "tropical":        "Needs warmth and humidity. Mist leaves occasionally and keep away from cold draughts.",
    "succulent":       "Water sparingly — let the soil dry out completely between waterings. Loves a sunny spot.",
    "fern":            "Keep soil consistently moist and humidity high. Avoid direct sun and dry air.",
    "general":         "Check soil moisture regularly and adjust watering based on season and conditions."
  };
  const box = document.getElementById("coachBox");
  const tip = tips[type];
  if (tip) {
    box.innerHTML = `<div class="coach-box-title">Care tip</div>${tip}`;
    box.classList.remove("hidden");
  } else {
    box.classList.add("hidden");
  }
}

async function waterPlant() {
  if (!current) return;
  const { error } = await db.from("plants").update({ last_watered: new Date().toISOString() }).eq("id", current.id);
  if (error) { toast("Error logging watering"); console.error("waterPlant error:", error); return; }
  toast("Watered 💧");
  openPlant(current.id);
  loadPlants();
}

async function uploadPhoto() {
  const file = document.getElementById("photoInput").files[0];
  if (!file || !current) return;
  toast("Uploading photo…");

  const ext      = file.name.split(".").pop();
  const fileName = `${current.id}-${Date.now()}.${ext}`;

  const { error: uploadError } = await db.storage.from("Plant-Photos").upload(fileName, file, { upsert: true });
  if (uploadError) { toast("Upload failed"); console.error("uploadPhoto error:", uploadError); return; }

  const { data: urlData } = db.storage.from("Plant-Photos").getPublicUrl(fileName);

  const { error: updateError } = await db.from("plants").update({ photo_url: urlData.publicUrl }).eq("id", current.id);
  if (updateError) { toast("Could not save photo URL"); console.error("updatePhoto error:", updateError); return; }

  toast("Photo saved 📷");
  openPlant(current.id);
  loadPlants();
}

function showEditBox() {
  if (!current) return;
  document.getElementById("eName").value     = current.name || "";
  document.getElementById("eSpecies").value  = current.species || "";
  document.getElementById("eLocation").value = current.location || "";
  document.getElementById("eInterval").value = current.watering_interval_days || 7;
  document.getElementById("eType").value     = current.plant_type || "general";
  document.getElementById("eNotes").value    = current.notes || "";
  document.getElementById("editBox").classList.remove("hidden");
}

function hideEditBox() {
  document.getElementById("editBox").classList.add("hidden");
}

async function saveEdit() {
  if (!current) return;
  const payload = {
    name:                   document.getElementById("eName").value.trim(),
    species:                document.getElementById("eSpecies").value.trim() || null,
    location:               document.getElementById("eLocation").value.trim() || null,
    plant_type:             document.getElementById("eType").value,
    watering_interval_days: parseInt(document.getElementById("eInterval").value) || 7,
    notes:                  document.getElementById("eNotes").value.trim() || null,
  };
  if (!payload.name) { toast("Name is required"); return; }

  const { error } = await db.from("plants").update(payload).eq("id", current.id);
  if (error) { toast("Error saving changes"); console.error("saveEdit error:", error); return; }

  toast("Changes saved ✓");
  hideEditBox();
  openPlant(current.id);
  loadPlants();
}

async function deletePlant() {
  if (!current) return;
  if (!confirm(`Delete "${current.name}"? This can't be undone.`)) return;

  const { error } = await db.from("plants").delete().eq("id", current.id);
  if (error) { toast("Error deleting plant"); console.error("deletePlant error:", error); return; }

  toast("Plant deleted");
  back();
  loadPlants();
}

function back() {
  document.getElementById("detailView").classList.add("hidden");
  document.getElementById("listView").classList.remove("hidden");
  current = null;
}

function escHtml(str) {
  if (!str) return "";
